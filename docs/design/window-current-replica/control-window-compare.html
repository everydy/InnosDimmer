<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>InnosDimmer Control Window Compare</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: #101113;
      color: #f1f0ec;
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid #2e3138;
      background: rgba(16, 17, 19, 0.94);
      backdrop-filter: blur(10px);
    }

    h1 {
      margin: 0;
      font-size: 17px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    a {
      color: #f1f0ec;
      text-decoration: none;
    }

    nav a {
      padding: 7px 10px;
      border: 1px solid #3a3d45;
      border-radius: 7px;
      background: #202228;
      color: #aaa8a1;
      font-size: 12px;
      font-weight: 650;
    }

    .compare {
      display: grid;
      grid-template-columns: minmax(720px, 1fr) minmax(720px, 1fr);
      gap: 18px;
      padding: 18px;
    }

    .pane {
      min-width: 0;
      border: 1px solid #2e3138;
      border-radius: 10px;
      background: #17181b;
      overflow: hidden;
    }

    .pane-title {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid #2e3138;
    }

    .pane-title strong {
      font-size: 14px;
    }

    .pane-title span {
      color: #aaa8a1;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    iframe {
      display: block;
      width: 100%;
      height: 760px;
      border: 0;
      background: #101113;
    }

    @media (max-width: 1480px) {
      .compare {
        grid-template-columns: 1fr;
      }

      iframe {
        height: 760px;
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>InnosDimmer control window replicas</h1>
    <nav aria-label="Window replica links">
      <a href="../window-redesign/app-window-componentized-mockup.html">Ideal only</a>
      <a href="./control-window-replica.html">Current only</a>
    </nav>
  </header>

  <main class="compare">
    <section class="pane">
      <div class="pane-title">
        <strong>Ideal mockup</strong>
        <span>docs/design/window-redesign/app-window-componentized-mockup.html</span>
      </div>
      <iframe src="../window-redesign/app-window-componentized-mockup.html" title="Existing control window mockup"></iframe>
    </section>

    <section class="pane">
      <div class="pane-title">
        <strong>Current implementation replica</strong>
        <span>docs/design/window-current-replica/control-window-replica.html</span>
      </div>
      <iframe src="./control-window-replica.html" title="Current implementation control window replica"></iframe>
    </section>
  </main>
</body>
</html>
